# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Dr. Ben Zhang"
title_separator          : "-"
name                     : &name "Dr. Ben Zhang"
description              : &description "Postdoctoral Fellow | Wireless Power Transfer | AUV | Magnetic Couplers"

url                      : https://beibao123789.github.io
baseurl                  : ""
repository               : "Beibao123789/BenZhang.github.io"

# Author Info
author:
  avatar           : "avatar.jpg"
  name             : "Dr. Ben Zhang"
  pronouns         :
  bio              : "Postdoctoral Fellow at City University of Hong Kong. Research in Wireless Power Transfer for AUV systems."
  location         : "Hong Kong, China"
  employer         : "City University of Hong Kong"
  uri              :
  email            : "ZHANG.Ben@cityu.edu.hk"

  # Academic profiles
  googlescholar    :
  orcid            : "https://orcid.org/0000-0002-8552-2312"

  # Development
  github           : "Beibao123789"

  # Social
  linkedin         :
  twitter          :
  zhihu            :

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comments
comments:
  provider               :

# Atom Feed
atom_feed:
  hide                   : false

# SEO
google_site_verification :
bing_site_verification   :

# Social Sharing
social:
  type                   : Person
  name                   : "Dr. Ben Zhang"
  links:
    - https://orcid.org/0000-0002-8552-2312

# Analytics
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown
markdown: kramdown
highlighter: rouge

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Output
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
